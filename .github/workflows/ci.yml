name: .NET CI Pipeline

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    # Hier haben wir jetzt den Pfad angepasst: "agent/NovaMind/"
    - name: Restore dependencies
      run: dotnet restore agent/NovaMind/

    - name: Build
      run: dotnet build agent/NovaMind/ --no-restore --configuration Release

    - name: Test
      run: dotnet test agent/NovaMind/NovaMind.Tests/NovaMind.Tests.csproj --no-build --configuration Release --verbosity normal