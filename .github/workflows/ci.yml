name: .NET CI Pipeline

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    # 1. Stellt alle NuGet-Pakete für das Testprojekt (und dessen Abhängigkeiten) wieder her
    - name: Restore dependencies
      run: dotnet restore agent/NovaMind/NovaMind.Tests/NovaMind.Tests.csproj

    # 2. Baut das Testprojekt (und automatisch das Hauptprojekt NovaMind) im Release-Modus
    - name: Build
      run: dotnet build agent/NovaMind/NovaMind.Tests/NovaMind.Tests.csproj --no-restore --configuration Release

    # 3. Führt die Tests absolut sicher und blitzschnell ohne erneuten Build aus
    - name: Test
      run: dotnet test agent/NovaMind/NovaMind.Tests/NovaMind.Tests.csproj --no-build --configuration Release --verbosity normal