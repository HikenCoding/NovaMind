name: .NET CI Pipeline

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x # Falls du eine ältere/neuere Version nutzt, hier anpassen!

    - name: Restore dependencies
      run: dotnet restore NovaMind/

    - name: Build
      run: dotnet build NovaMind/ --no-restore --configuration Release

    - name: Test
      run: dotnet test NovaMind/ --no-build --verbosity normal